<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно!</title>
    <style>
        body { 
            background: #000; 
            color: #00f3ff; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { text-shadow: 0 0 20px #00f3ff; }
        p { font-size: 1.2rem; margin-top: 20px; }
        .loader { margin-top: 30px; color: #fff; }
    </style>
</head>
<body>

    <h1>Оплата прошла успешно!</h1>
    <p>Спасибо за покупку. Платный автокликер активирован в вашем аккаунте.</p>
    <div class="loader">Возврат в игру через 3 секунды...</div>

    <script>
        // 1. Активируем "бессмертный" бонус в памяти браузера
        localStorage.setItem('paidAutoClicker', 'true');
        
        // 2. Через 3 секунды отправляем игрока обратно на сайт
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
    </script>
</body>
</html>
